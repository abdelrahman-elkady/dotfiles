###################
## Configuration ##
###################

# use modern terminal with true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# set pane splitting
bind-key v split-window -h  -c '#{pane_current_path}'
bind-key h split-window -c '#{pane_current_path}'

# set new window
bind c new-window -c '#{pane_current_path}'

# re-number windows when one is closed
set -g renumber-windows on

# auto-rename windows:
# - claude code running: cc-<directory>
# - no process running: <directory>
# - other process running: <process-name>
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{m:*claude*,#{pane_current_command}},cc-#{b:pane_current_path},#{?#{==:#{pane_current_command},#{b:SHELL}},#{b:pane_current_path},#{pane_current_command}}}'

# status bar refresh rate (default=15)
set -g status-interval 5


##################
## Key Bindings ##
##################


# Force reload the config file
unbind r
bind r source-file ~/.tmux.conf \; display-message "configuration reloaded !"

# Using Ctrl-a for commands
unbind C-b
set-option -g prefix C-a
bind-key C-a last-window

# enable tmux mouse (click panes/windows, resize panes, scroll)
set -g mouse on

# prevent tmux from auto-copying to system clipboard (OSC 52)
set -s set-clipboard off

# allow escape sequences to pass through to the outer terminal (enables Claude Code notifications)
set -g allow-passthrough on

# Allows for faster key repetition
set -s escape-time 0

# Alt-arrow for navigation between panes
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

############
## Colors ##
############

# status bar colors
set -g status-bg default
set -g status-fg "#080808"

# non-active windows
set -g window-status-style fg="#00005f",bg="#626262",dim

# highlight current window
set-window-option -g window-status-current-style fg="#00005f",bg="#87d7ff",bright

# pane border color
set-option -g pane-border-style fg="#3a3a3a"
set-option -g pane-active-border-style fg="#005f00"

# message text
set-option -g message-style bg="#262626",fg="#00d7ff"

# clock mode
set -g clock-mode-style 12

set -g status-justify left
set -g status-left "[#h]"
set -g status-left-style bg="default",bright
set -g status-left-length 50

set -g status-right "%d %b %l:%M %p"
set -g status-right-style fg="#00d7ff",bright

###############
## Powerline ##
###############

run-shell "powerline-daemon -q"

# Dynamic powerline path detection (cross-platform)
# uv tool install location
if-shell "test -d ~/.local/share/uv/tools/powerline-status" \
    'run-shell "~/.local/share/uv/tools/powerline-status/bin/powerline-config tmux setup"'
# pip --user install location
if-shell "test -f ~/.local/lib/python3.*/site-packages/powerline/bindings/tmux/powerline.conf" \
    "source ~/.local/lib/python3.*/site-packages/powerline/bindings/tmux/powerline.conf"
# Linux system package location
if-shell "test -f /usr/share/powerline/bindings/tmux/powerline.conf" \
    "source /usr/share/powerline/bindings/tmux/powerline.conf"
# Fallback: use powerline-config if in PATH
if-shell "command -v powerline-config >/dev/null 2>&1" \
    'run-shell "powerline-config tmux setup"'
